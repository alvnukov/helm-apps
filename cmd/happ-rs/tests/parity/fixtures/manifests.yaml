apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-config
  namespace: default
data:
  APP_MODE: "prod"
---
apiVersion: v1
kind: Service
metadata:
  name: demo-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: demo
  ports:
    - name: http
      port: 80
      targetPort: 8080
